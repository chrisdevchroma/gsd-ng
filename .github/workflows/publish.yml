name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g., v1.0.0-dev.4)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve ref
        id: resolve
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            REF="$INPUT_TAG"
          else
            REF="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+\.[0-9]+)?$ ]]; then
            echo "::error::Resolved ref '$REF' is not a valid release tag"
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.resolve.outputs.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate release
        shell: bash
        env:
          TAG: ${{ steps.resolve.outputs.ref }}
        run: bash scripts/validate-release.sh "${TAG#v}"

      - name: Publish to npm
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="${VERSION#*-}"
            TAG="${PRERELEASE%%.*}"
            echo "Publishing $VERSION under '$TAG' tag"
            npm publish --access public --provenance --tag "$TAG"
          else
            echo "Publishing $VERSION under 'latest' tag"
            npm publish --access public --provenance
          fi
