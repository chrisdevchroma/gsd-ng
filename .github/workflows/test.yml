name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  package-files-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Validate package.json files allowlist
        shell: bash
        run: |
          ALLOWED='bin commands gsd-ng agents hooks/dist'
          FILES=$(node -p "require('./package.json').files.join(' ')")
          for entry in $FILES; do
            if ! echo "$ALLOWED" | grep -qw "$entry"; then
              echo "::error::package.json files contain '$entry' which is not in the allowlist: $ALLOWED"
              exit 1
            fi
          done
          echo "package.json files OK: $FILES"

  changelog-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check CHANGELOG updated
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.base_ref }}
        shell: bash
        run: |
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated"
          else
            if [ "$BASE_REF" = "main" ]; then
              echo "::error::CHANGELOG.md must be updated for PRs to main"
              exit 1
            else
              echo "::warning::CHANGELOG.md was not updated in this PR"
            fi
          fi

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        shell: bash
        run: npm run test:coverage

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install actionlint
        shell: bash
        run: |
          ACTIONLINT_VERSION="1.7.7"
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C "$HOME/.local/bin" actionlint
          chmod +x "$HOME/.local/bin/actionlint"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          actionlint --version

      - name: Lint GitHub Actions workflows
        shell: bash
        run: actionlint .github/workflows/*.yml
