name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install dev dependencies
        run: npm ci

      - name: Build hooks
        run: npm run build:hooks

      - name: Build tarball
        run: node scripts/build-tarball.js

      - name: Detect prerelease
        id: meta
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5afe4a7eb7111b6cb4ef7282db1 # v2
        with:
          files: dist/gsd-ng.tar.gz
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
